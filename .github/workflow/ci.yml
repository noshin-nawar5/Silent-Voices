name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend lint & build ──────────────────────────────────────
  frontend:
    name: Frontend — Install & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://silent-voices-api.onrender.com

  # ── Backend syntax check ───────────────────────────────────────
  backend:
    name: Backend — Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Check Python syntax
        run: python -m py_compile backend/app.py && echo "✅ app.py syntax OK"

      - name: Validate labels.json
        run: python -c "import json; json.load(open('backend/labels.json')); print('✅ labels.json valid')"
