name: 💡 Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Thanks for suggesting a feature! 🌸"

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "Currently, it's hard to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe your solution
      placeholder: "It would be great if..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend (UI)
        - Backend (API)
        - ML Model
        - New Sign Classes
        - Other
    validations:
      required: true
